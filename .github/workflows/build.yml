name: Build Motor Tool

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            os: ubuntu-latest
            ext: ''
          - platform: windows
            os: windows-latest
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Ubuntu binaries
        if: runner.os == 'Linux'
        run: |
          chmod +x build_motor_tool.sh
          ./build_motor_tool.sh

      - name: Build Windows binaries
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          .\build_motor_tool.bat

      - name: Upload CANable artifact
        uses: actions/upload-artifact@v4
        with:
          name: motor_tool-canable-${{ matrix.platform }}
          path: dist/motor_tool_canable${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload Damiao artifact
        uses: actions/upload-artifact@v4
        with:
          name: motor_tool-damiao-${{ matrix.platform }}
          path: dist/motor_tool_damiao${{ matrix.ext }}
          if-no-files-found: error
